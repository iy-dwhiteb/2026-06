<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マスターコントローラー（完全自動版）</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #222; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { margin-top: 0; color: #ff4d4d; border-bottom: 2px solid #ff4d4d; padding-bottom: 5px; }
        button { background: #ff4d4d; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:active { background: #cc0000; }
        .btn-secondary { background: #444; }
        .btn-secondary.active { background: #00cc66; }
        .flex { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        label { font-size: 14px; color: #ccc; width: 140px; display: inline-block; }
        input[type="text"], input[type="range"] { flex-grow: 1; padding: 8px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        #setup-screen { display: block; }
        #main-screen { display: none; }
        .link-box { background: #113311; border: 1px solid #00ff00; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .link-box a { color: #00ff00; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👻 お化け屋敷 統合制御システム</h1>

        <div id="setup-screen" class="card">
            <h2>⚙️ Firebase 接続初期設定</h2>
            <p style="color: #aaa; font-size: 14px;">Firebaseコンソールの「ウェブアプリの設定」を見ながら、以下の7つをコピペしてください。</p>
            <div class="flex"><label>apiKey:</label><input type="text" id="cfg-apiKey" placeholder="AIzaSy..."></div>
            <div class="flex"><label>authDomain:</label><input type="text" id="cfg-authDomain" placeholder="xxx.firebaseapp.com"></div>
            <div class="flex"><label>databaseURL:</label><input type="text" id="cfg-databaseURL" placeholder="https://xxx.firebaseio.com"></div>
            <div class="flex"><label>projectId:</label><input type="text" id="cfg-projectId" placeholder="xxx"></div>
            <div class="flex"><label>storageBucket:</label><input type="text" id="cfg-storageBucket" placeholder="xxx.appspot.com"></div>
            <div class="flex"><label>messagingSenderId:</label><input type="text" id="cfg-messagingSenderId" placeholder="123456789"></div>
            <div class="flex"><label>appId:</label><input type="text" id="cfg-appId" placeholder="1:123:web:abc"></div>
            <button id="connect-btn" style="background: #00cc66; width: 100%; font-size: 18px; padding: 15px;">保存してシステムを起動する</button>
        </div>

        <div id="main-screen">
            <div class="link-box">
                <h3>📱 iPad接続用URL（各iPadでこのURLを開いてください）</h3>
                <p>🔴 <strong>① 心電図iPad用:</strong><br><a id="link-ecg" href="#" target="_blank">生成中...</a></p>
                <p>🔵 <strong>② 音響A (ロッカー):</strong><br><a id="link-audioA" href="#" target="_blank">生成中...</a></p>
                <p>🔵 <strong>③ 音響B (電話):</strong><br><a id="link-audioB" href="#" target="_blank">生成中...</a></p>
                <p>🔵 <strong>④ 音響C (足音):</strong><br><a id="link-audioC" href="#" target="_blank">生成中...</a></p>
                <button onclick="localStorage.clear(); location.reload();" class="btn-secondary" style="font-size: 12px; padding: 5px 10px;">⚙️ 設定をやり直す</button>
            </div>

            <div class="card">
                <h2>iPad ① : 心電図ギミック</h2>
                <div class="flex">
                    <button id="scare-btn" style="background: #ff0000; font-size: 20px; width: 100%;">🚨 お化け出現！（手動トリガー）</button>
                </div>
                <div class="flex">
                    <button id="auto-bpm-btn" class="btn-secondary active">自動心拍調整: ON</button>
                    <label style="width:auto;">手動BPM: <span id="bpm-val">70</span></label>
                    <input type="range" id="bpm-slider" min="30" max="220" value="70" disabled>
                </div>
            </div>

            <div class="card">
                <h2>iPad ②〜④ : 音響遠隔操作</h2>
                <div style="border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px;">
                    <h3>🔊 音響 A</h3>
                    <div class="flex">
                        <button id="triggerA-btn">一発再生</button>
                        <button id="loopA-btn" class="btn-secondary">周期再生: OFF</button>
                        <label style="width:auto;">間隔: <input type="number" id="intervalA" value="5" style="width: 50px; padding: 5px; background:#333; color:#fff; border:1px solid #555;"> 秒</label>
                    </div>
                </div>
                <div style="border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px;">
                    <h3>🔊 音響 B</h3>
                    <div class="flex">
                        <button id="triggerB-btn">一発再生</button>
                        <button id="loopB-btn" class="btn-secondary">周期再生: OFF</button>
                        <label style="width:auto;">間隔: <input type="number" id="intervalB" value="5" style="width: 50px; padding: 5px; background:#333; color:#fff; border:1px solid #555;"> 秒</label>
                    </div>
                </div>
                <div>
                    <h3>🔊 音響 C</h3>
                    <div class="flex">
                        <button id="triggerC-btn">一発再生</button>
                        <button id="loopC-btn" class="btn-secondary">周期再生: OFF</button>
                        <label style="width:auto;">間隔: <input type="number" id="intervalC" value="5" style="width: 50px; padding: 5px; background:#333; color:#fff; border:1px solid #555;"> 秒</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const keys = ['apiKey', 'authDomain', 'databaseURL', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
        
        // 履歴があれば自動読み込み
        if (localStorage.getItem('firebase_apiKey')) {
            const savedConfig = {};
            keys.forEach(k => savedConfig[k] = localStorage.getItem(`firebase_${k}`));
            startSystem(savedConfig);
        }

        document.getElementById('connect-btn').addEventListener('click', () => {
            const config = {};
            keys.forEach(k => {
                const val = document.getElementById(`cfg-${k}`).value.trim();
                config[k] = val;
                localStorage.setItem(`firebase_${k}`, val);
            });
            startSystem(config);
        });

        function startSystem(config) {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';

            // iPad用の設定パラメータを暗号化（Base64）してURLを生成
            const cfgToken = btoa(encodeURIComponent(JSON.stringify(config)));
            const baseUrl = window.location.href.split('?')[0].replace('master.html', '');
            
            document.getElementById('link-ecg').href = `${baseUrl}ipad_ecg.html?cfg=${cfgToken}`;
            document.getElementById('link-ecg').textContent = `${baseUrl}ipad_ecg.html?cfg=${cfgToken}`;
            
            ['audioA', 'audioB', 'audioC'].forEach(id => {
                const url = `${baseUrl}ipad_audio.html?cfg=${cfgToken}&id=${id}`;
                document.getElementById(`link-${id}`).href = url;
                document.getElementById(`link-${id}`).textContent = url;
            });

            // Firebase初期化
            const app = initializeApp(config);
            const db = getDatabase(app);

            // コントロールロジック結合
            bindControls(db);
        }

        function bindControls(db) {
            let autoBpm = true;
            let loops = { audioA: false, audioB: false, audioC: false };

            document.getElementById('scare-btn').addEventListener('click', () => {
                update(ref(db, 'ecg'), { scare: true });
                setTimeout(() => { update(ref(db, 'ecg'), { scare: false }); }, 1500);
            });

            document.getElementById('auto-bpm-btn').addEventListener('click', (e) => {
                autoBpm = !autoBpm;
                e.target.textContent = `自動心拍調整: ${autoBpm ? 'ON' : 'OFF'}`;
                e.target.classList.toggle('active', autoBpm);
                document.getElementById('bpm-slider').disabled = autoBpm;
                update(ref(db, 'ecg'), { auto: autoBpm });
            });

            document.getElementById('bpm-slider').addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                document.getElementById('bpm-val').textContent = val;
                update(ref(db, 'ecg'), { bpm: val });
            });

            function sendAudioTrigger(id) { update(ref(db, `audio/${id}`), { trigger: Date.now() }); }
            function sendAudioLoop(id) {
                loops[id] = !loops[id];
                const suffix = id.replace('audio', '');
                const btn = document.getElementById(`loop${suffix}-btn`);
                const intervalInput = document.getElementById(`interval${suffix}`);
                btn.textContent = `周期再生: ${loops[id] ? 'ON' : 'OFF'}`;
                btn.classList.toggle('active', loops[id]);
                update(ref(db, `audio/${id}`), { loop: loops[id], interval: parseInt(intervalInput.value) || 5 });
            }

            document.getElementById('triggerA-btn').addEventListener('click', () => sendAudioTrigger('audioA'));
            document.getElementById('triggerB-btn').addEventListener('click', () => sendAudioTrigger('audioB'));
            document.getElementById('triggerC-btn').addEventListener('click', () => sendAudioTrigger('audioC'));
            document.getElementById('loopA-btn').addEventListener('click', () => sendAudioLoop('audioA'));
            document.getElementById('loopB-btn').addEventListener('click', () => sendAudioLoop('audioB'));
            document.getElementById('loopC-btn').addEventListener('click', () => sendAudioLoop('audioC'));
        }
    </script>
</body>
</html>
