<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響システム（自動受信版）</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        #start-btn { background: #222; color: #ff4d4d; border: 2px solid #ff4d4d; padding: 30px 60px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 40px 0; width: 100%; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        #start-btn.active { color: #00cc66; border-color: #00cc66; background: #052c05; box-shadow: 0 0 15px rgba(0, 204, 102, 0.2); }
        .status-box { background: #222; padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid #333; }
        .status { font-size: 20px; font-weight: bold; color: #00cc66; margin-top: 10px; }
        .id-badge { background: #444; padding: 5px 15px; border-radius: 20px; font-size: 16px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 遠隔音響 再生端末</h1>
        <button id="start-btn">タップしてシステム開始<br>(音響解放)</button>
        <div class="status-box">
            <div id="id-display" class="id-badge">端末ID: 未設定</div>
            <div id="status-text" class="status" style="color: #ff4d4d;">接続準備中...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const urlParams = new URLSearchParams(window.location.search);
        const cfg = urlParams.get('cfg');
        const audioId = urlParams.get('id');

        if (!cfg || !audioId) {
            alert("エラー: マスター機から生成された正しいURLでアクセスしてください。");
        } else {
            document.getElementById('id-display').textContent = `端末ID: ${audioId}`;
            const firebaseConfig = JSON.parse(decodeURIComponent(atob(cfg)));
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            startAudio(db, audioId);
        }

        function startAudio(db, audioId) {
            const audioMap = { 'audioA': new Audio('audioA.mp3'), 'audioB': new Audio('audioB.mp3'), 'audioC': new Audio('audioC.mp3') };
            const myAudio = audioMap[audioId]; let isReady = false; let loopTimer = null;

            if (myAudio) { myAudio.volume = 1.0; } else { alert("不正な端末ID"); return; }

            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', () => {
                myAudio.play().then(() => {
                    myAudio.pause(); myAudio.currentTime = 0; isReady = true;
                    startBtn.textContent = "● システム稼働中 (音響解放済み)"; startBtn.classList.add('active');
                    document.getElementById('status-text').textContent = "命令待機中..."; document.getElementById('status-text').style.color = "#00cc66";
                }).catch(() => { isReady = true; });
            });

            function playSound() { if (isReady && myAudio) { myAudio.currentTime = 0; myAudio.play().catch(e => console.log(e)); } }

            let lastTrigger = 0;
            onValue(ref(db, `audio/${audioId}`), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.trigger && data.trigger !== lastTrigger) {
                        if (lastTrigger !== 0) playSound();
                        lastTrigger = data.trigger;
                    }
                    if (loopTimer) clearInterval(loopTimer);
                    if (data.loop && data.interval > 0) {
                        loopTimer = setInterval(() => { playSound(); }, data.interval * 1000);
                    }
                }
            });
        }
    </script>
</body>
</html>
