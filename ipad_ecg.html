<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad 1 - リアル心電図モニター</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100%; height: 85%; }
        #info { color: #00ff00; font-size: 28px; padding: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        
        /* スタートボタン */
        #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:100; }
        #start-btn { background: #052c05; color: #00ff00; border: 2px solid #00ff00; padding: 25px 50px; font-size: 22px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* お化け襲来演出 */
        #scare-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('obake.jpg'); 
            background-size: cover; background-position: center;
            display: none; z-index: 50;
            animation: shake 0.08s infinite;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-8px, 8px); }
            50% { transform: translate(-8px, -8px); }
            75% { transform: translate(8px, 8px); }
            100% { transform: translate(8px, -8px); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">TAP TO START (心電図開始)</button>
    </div>

    <div id="scare-overlay"></div>

    <div id="info">
        <div>PATIENT: UNKNOWN</div>
        <div>BPM: <span id="bpm-display">70</span></div>
    </div>
    <canvas id="ecgCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ あなたの Firebase 設定に置き換えてください
        const firebaseConfig = {
    apiKey: "AIzaSyBim5cUqruA95jBJ_WgrO7W7A79Ugoyl_c",
    authDomain: "project-1857534204298442592.firebaseapp.com",
    databaseURL: "https://project-1857534204298442592-default-rtdb.firebaseio.com",
    projectId: "project-1857534204298442592",
    storageBucket: "project-1857534204298442592.firebasestorage.app",
    messagingSenderId: "34184873831",
    appId: "1:34184873831:web:1c984c7e1c34ca57d191c2"
  };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentBpm = 70;
        let isAuto = true;
        let isScare = false;
        let isReady = false;

        const scareAudio = new Audio('scare_sound.mp3'); 
        scareAudio.volume = 1.0;

        let audioCtx = null;

        // タップしてロック解除（iPad必須処理）
        document.getElementById('start-btn').addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            scareAudio.play().then(() => {
                scareAudio.pause();
                scareAudio.currentTime = 0;
                isReady = true;
                document.getElementById('start-overlay').style.display = 'none';
            }).catch(e => {
                // 音源ファイルがない場合でもシステムは開始できるようにする
                isReady = true;
                document.getElementById('start-overlay').style.display = 'none';
                console.log("音源ファイル読み込みスキップ");
            });
        });

        // 本物のピコン音（高音化: 1000Hz）
        function playBeep() {
            if (!audioCtx || isScare || !isReady) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1020, audioCtx.currentTime); // 本物の医療機器に近い1020Hzに設定
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12); // 短くキレのある音に
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // Firebaseリアルタイム監視の修正
        let lastScareState = false;
        onValue(ref(db, 'ecg'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                isAuto = data.auto ?? true;
                isScare = data.scare ?? false;
                if (!isAuto) currentBpm = data.bpm || 70;
                
                if (isScare && !lastScareState) {
                    document.getElementById('scare-overlay').style.display = 'block';
                    if (isReady) {
                        scareAudio.currentTime = 0;
                        scareAudio.play().catch(e => console.log(e));
                    }
                } else if (!isScare && lastScareState) {
                    document.getElementById('scare-overlay').style.display = 'none';
                }
                lastScareState = isScare;
            }
        });

        // --- 心電図描画ロジック ---
        const canvas = document.getElementById('ecgCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.85;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        let scanX = 0;
        const speed = 4; // 少し滑らかに動くよう調整
        let lastY = canvas.height / 2;
        let t = 0;
        let frameCount = 0;

        function draw() {
            frameCount += speed;
            t += 0.02;

            if (isAuto && !isScare) {
                currentBpm = Math.floor(72 + Math.sin(t * 0.3) * 10);
            } else if (isScare) {
                currentBpm = 160;
            }
            document.getElementById('bpm-display').textContent = isScare ? "???" : currentBpm;

            let framesPerBeat = (60 / currentBpm) * 60;
            let beatPos = Math.floor(frameCount) % Math.floor(framesPerBeat);

            let targetY = canvas.height / 2;

            // 脈拍タイミングで音をトリガー
            if (beatPos >= 0 && beatPos < speed) {
                playBeep();
            }
            
            // 波形生成
            if (beatPos > 0 && beatPos < 12) targetY -= 6;
            else if (beatPos >= 16 && beatPos < 22) targetY += 12;
            else if (beatPos >= 22 && beatPos < 28) targetY -= 120;
            else if (beatPos >= 28 && beatPos < 34) targetY += 40;
            else if (beatPos >= 48 && beatPos < 70) targetY -= 15;

            if (isScare) {
                targetY = (canvas.height / 2) + (Math.random() - 0.5) * (canvas.height * 0.8);
            }

            // 残像を残すためのクリア処理
            ctx.fillStyle = '#000';
            ctx.fillRect(scanX, 0, 30, canvas.height);

            ctx.beginPath();
            ctx.strokeStyle = isScare ? '#ff0000' : '#00ff00'; // お化けの時は波形も赤に
            ctx.lineWidth = 3;
            ctx.moveTo(scanX - speed, lastY);
            ctx.lineTo(scanX, targetY);
            ctx.stroke();

            lastY = targetY;
            scanX += speed;

            if (scanX > canvas.width) {
                scanX = 0;
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
